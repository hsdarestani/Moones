services:
  app:
    build: .
    container_name: mones-app
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16-alpine
    container_name: mones-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mones
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: mones-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  postgres_data:
