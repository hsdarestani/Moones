{% import "admin/csrf.html" as csrf with context %}
<!doctype html><html lang="fa" dir="rtl"><head><meta charset="utf-8"><title>ورود ادمین</title><link rel="stylesheet" href="/static/admin.css"></head><body class="admin-body"><main class="card" style="max-width:420px;margin:8rem auto;padding:2rem"><h1>ورود امن مدیریت</h1>{% if error %}<div class="alert">نام کاربری یا رمز عبور معتبر نیست.</div>{% endif %}<form method="post" action="/admin/login">{{ csrf.field() }}<label>نام کاربری<input name="username" autocomplete="username" required></label><label>رمز عبور<input name="password" type="password" autocomplete="current-password" required></label><button type="submit">ورود</button></form></main></body></html>
