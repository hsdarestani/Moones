<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>داشبورد مونس</title>
  <link rel="stylesheet" href="/static/admin.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">Moones Admin<small>پنل مدیریت مونس؛ گرم، دقیق و مرتب 🌙</small></div>
      <nav class="nav">
        <a href="/admin">داشبورد</a>
        <a href="/admin/receipts">رسیدها</a>
        <a href="/admin/settings">تنظیمات</a>
        <a href="/admin/stickers">استیکرها</a>
      </nav>
    </aside>
    <main class="main">
      <div class="topbar">
        <h1>داشبورد مدیریت</h1>
        <span class="subtle">وب‌اپ ادمین مونس</span>
      </div>
      {% if request.query_params.get('error') == 'credit' %}
      <div class="alert">مبلغ واردشده معتبر نیست یا از سقف مجاز بیشتره. لطفاً یک عدد منطقی به تومان وارد کن.</div>
      {% endif %}
      {% block content %}{% endblock %}
    </main>
  </div>
</body>
</html>
