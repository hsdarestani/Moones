name: Run final scoped partner selfie continuity

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  patch-test-commit:
    if: github.head_ref == 'agent/fix-selfie-scene-identity-continuity'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-selfie-scene-identity-continuity
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Apply scoped current-scene and explicit-camera patch
        run: python scripts/patch_partner_selfie_context_scope.py
      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt
      - name: Compile and test
        run: |
          python -m py_compile \
            app/api/telegram.py \
            app/services/semantic_image_intent_router.py \
            app/services/partner_photo_contract.py \
            app/services/image_pipeline_v2.py \
            app/services/generated_image_qa_service.py \
            app/services/image_generation_service.py
          pytest -q \
            tests/test_partner_selfie_continuity.py \
            tests/test_semantic_image_intent_router.py \
            tests/test_partner_photo_engine.py \
            tests/test_image_generation_jobs.py \
            tests/test_telegram_runtime_imports.py \
            tests/test_interaction_reliability.py \
            tests/test_simple_chat.py
          git diff --check
      - name: Commit validated product changes
        run: |
          find . -type d -name __pycache__ -prune -exec rm -rf {} +
          find . -type f -name '*.pyc' -delete
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add app/services/semantic_image_intent_router.py tests/test_partner_selfie_continuity.py
          git commit -m 'Scope current photo scene and preserve explicit camera choices'
          git push origin HEAD:agent/fix-selfie-scene-identity-continuity
