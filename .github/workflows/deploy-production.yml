name: Production deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: moones-production
  cancel-in-progress: false

jobs:
  verify:
    name: Verify release
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Prepare test environment
        run: cp .env.example .env

      - name: Validate Docker Compose
        run: docker compose config -q

      - name: Build application image
        run: docker compose build app

      - name: Compile critical modules
        run: |
          docker compose run --rm -T app \
            python -m py_compile \
            app/api/telegram.py \
            app/engine/simple_chat.py \
            app/services/interaction_reliability.py \
            app/services/image_generation_service.py

      - name: Run release regression suite
        run: |
          docker compose run --rm -T app pytest -q \
            tests/test_interaction_reliability.py \
            tests/test_simple_chat.py \
            tests/test_semantic_image_intent_router.py \
            tests/test_image_generation_client.py \
            tests/test_image_generation_jobs.py \
            tests/test_telegram_runtime_imports.py

      - name: Clean up test containers
        if: always()
        run: docker compose down -v --remove-orphans

  deploy:
    name: Deploy production
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: production

    steps:
      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.PROD_SSH_KNOWN_HOSTS }}
        run: |
          test -n "$SSH_PRIVATE_KEY"
          test -n "$SSH_KNOWN_HOSTS"

          install -m 700 -d "$HOME/.ssh"
          printf '%s\n' "$SSH_PRIVATE_KEY" | tr -d '\r' > "$HOME/.ssh/moones_deploy"
          printf '%s\n' "$SSH_KNOWN_HOSTS" | tr -d '\r' > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/moones_deploy" "$HOME/.ssh/known_hosts"

      - name: Deploy exact main commit
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_PORT: ${{ secrets.PROD_PORT }}
          PROD_USER: ${{ secrets.PROD_USER }}
        run: |
          test -n "$PROD_HOST"

          port="${PROD_PORT:-22}"
          user="${PROD_USER:-root}"

          ssh \
            -i "$HOME/.ssh/moones_deploy" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile="$HOME/.ssh/known_hosts" \
            -o ConnectTimeout=10 \
            -o ServerAliveInterval=15 \
            -o ServerAliveCountMax=2 \
            -p "$port" \
            "$user@$PROD_HOST" \
            "deploy $GITHUB_SHA"
