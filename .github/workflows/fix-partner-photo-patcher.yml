name: Repair partner photo patcher

on:
  pull_request:
    branches:
      - main
    types: [reopened, synchronize]

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/rebuild-partner-photo-engine
          fetch-depth: 0
      - name: Repair nested QA prompt quoting
        run: |
          python - <<'PY'
          from pathlib import Path

          p=Path('scripts/codex_partner_photo_patch.py')
          text=p.read_text(encoding='utf-8')
          marker="regex_once(\n    'app/services/generated_image_qa_service.py',\n    r\"QA_PROMPT='''.*?'''\","
          start=text.index(marker)
          end=text.index("\n)\nreplace_once(", start)+2
          qa=(
              "You are a fail-closed visual fulfillment and realism QA module for photos shared by a persistent fictional adult partner. "
              "Return JSON only. Do not identify any real person. Count visible non-reflected humans separately from a same-subject mirror reflection. "
              "Check the requested primary subject, required objects or pet, partner visibility, face shown or hidden, back-facing pose, framing, scene, camera method, and whether the capture is physically plausible. "
              "Reject passport, ID, casting-headshot defaults when a natural personal photo was requested. For object-only or pet-only requests, zero humans is correct and any visible human is a failure. "
              "For hands-only requests, verify only the requested hands or forearms are shown and no face, head, or torso appears. A physically consistent reflection of the same intended partner is not a second person. "
              "Schema: {\"person_count\":1,\"face_count\":1,\"intended_subject_count\":1,\"unexpected_additional_person_visible\":false,\"background_extra_person_visible\":false,\"duplicate_subject_visible\":false,\"reflection_visible\":false,\"reflection_matches_primary_subject\":true,\"reflected_distinct_person_visible\":false,\"selfie_detected\":false,\"mirror_selfie_detected\":false,\"interaction_detected\":null,\"interaction_matches_request\":true,\"confidence\":\"high\",\"framing\":\"medium\",\"framing_matches_request\":true,\"full_body_visible\":false,\"head_inside_frame\":true,\"feet_inside_frame\":true,\"body_not_cropped\":true,\"requested_scene_visible\":true,\"requested_support_surface_visible\":true,\"requested_pose_matches\":true,\"identity_consistency_reasonable\":true,\"primary_subject_matches_request\":true,\"pet_visible\":false,\"required_objects_visible\":true,\"partner_visible\":true,\"face_visible\":true,\"face_hidden_matches_request\":true,\"back_to_camera_matches_request\":true,\"camera_mode_detected\":\"casual_phone_photo\",\"camera_mode_matches_request\":true,\"natural_capture_plausible\":true,\"looks_like_id_photo\":false,\"hands_only_matches_request\":true,\"reason_codes\":[]}"
          )
          replacement=(
              "qa_prompt_replacement = " + repr("QA_PROMPT='''" + qa + "'''") + "\n"
              "regex_once(\n"
              "    'app/services/generated_image_qa_service.py',\n"
              "    r\"QA_PROMPT='''.*?'''\",\n"
              "    qa_prompt_replacement,\n"
              ")"
          )
          p.write_text(text[:start] + replacement + text[end:], encoding='utf-8')
          compile(p.read_text(encoding='utf-8'), str(p), 'exec')
          PY
      - name: Commit repair
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add scripts/codex_partner_photo_patch.py
          git commit -m 'Repair partner photo QA prompt patcher' || exit 0
          git pull --rebase origin codex/rebuild-partner-photo-engine
          git push origin HEAD:codex/rebuild-partner-photo-engine
