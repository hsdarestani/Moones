name: Agent image provider failover

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

env:
  PYTHONDONTWRITEBYTECODE: '1'

jobs:
  patch-test-commit:
    if: github.head_ref == 'agent/fix-image-provider-failover'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          persist-credentials: true
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Apply provider failover patches
        run: |
          set -euo pipefail
          if grep -q 'IMAGE_PROVIDER_MODEL_FAILED' app/services/image_generation_service.py; then
            echo 'Provider failover patch already applied'
          else
            python .github/scripts/patch_image_provider_failover.py
          fi
          if grep -q 'deferred_generation_models = model_plan\[2:\]' app/services/image_generation_service.py; then
            echo 'Provider plan limit already applied'
          else
            python .github/scripts/patch_provider_plan_limit.py
          fi
      - name: Strict validation
        id: validate
        continue-on-error: true
        run: |
          exec > >(tee .provider-test.log) 2>&1
          set -euo pipefail
          find app tests -type d -name __pycache__ -prune -exec rm -rf {} +
          python -B -m py_compile \
            app/core/config.py \
            app/llm/image_client.py \
            app/services/provider_pricing_registry.py \
            app/services/image_generation_service.py
          pytest -q \
            tests/test_image_provider_failover.py \
            tests/test_image_generation_jobs.py \
            tests/test_image_qa_latency_status.py \
            tests/test_semantic_image_intent_router.py
          find app tests -type d -name __pycache__ -prune -exec rm -rf {} +
          git diff --check
      - name: Commit product changes and diagnostics
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          find app tests -type d -name __pycache__ -prune -exec rm -rf {} +
          git add app tests .provider-test.log
          if git diff --cached --quiet; then
            echo 'No changes to commit'
          else
            git commit -m 'Fix Venice image model discovery and failover'
            git push origin HEAD:${{ github.head_ref }}
          fi
      - name: Enforce validation
        if: steps.validate.outcome == 'failure'
        run: exit 1
