name: Agent image QA latency status fix

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  patch-test-commit:
    if: github.head_ref == 'fix/image-qa-latency-status'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          persist-credentials: true
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Apply patch
        run: |
          set -euo pipefail
          python .github/scripts/patch_image_qa_latency_status.py
      - name: Compile
        run: |
          set -euo pipefail
          python -m py_compile \
            app/services/generated_image_qa_service.py \
            app/services/image_generation_service.py \
            app/services/semantic_image_intent_router.py \
            app/api/telegram.py
      - name: Focused tests
        run: |
          set -euo pipefail
          pytest -q \
            tests/test_image_qa_latency_status.py \
            tests/test_image_generation_jobs.py \
            tests/test_semantic_image_intent_router.py \
            tests/test_telegram_runtime.py
      - name: Diff check
        run: |
          set -euo pipefail
          git diff --check
      - name: Commit product changes
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add app tests
          if git diff --cached --quiet; then
            echo 'No product changes to commit'
          else
            git commit -m 'Bound image QA latency and fix active-job follow-ups'
            git push origin HEAD:${{ github.head_ref }}
          fi
