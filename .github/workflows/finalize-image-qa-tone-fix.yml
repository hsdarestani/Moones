name: Finalize image QA retry and tone repair

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  repair-test-commit:
    if: github.head_ref == 'agent/fix-image-qa-retry-and-tone-leak'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-image-qa-retry-and-tone-leak
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Repair compact QA prompt newline
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          path=Path('app/services/generated_image_qa_service.py')
          text=path.read_text(encoding='utf-8')
          broken='return COMPACT_QA_PROMPT + "\nRequirements: " + json.dumps(payload, ensure_ascii=False, sort_keys=True)'
          fixed='return COMPACT_QA_PROMPT + "\\nRequirements: " + json.dumps(payload, ensure_ascii=False, sort_keys=True)'
          if fixed not in text:
              if broken not in text:
                  raise SystemExit('compact QA prompt newline target not found')
              text=text.replace(broken, fixed, 1)
          path.write_text(text, encoding='utf-8')
          PY
      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Strict compile and focused tests
        run: |
          set -euo pipefail
          python -m py_compile \
            app/engine/simple_chat.py \
            app/services/interaction_reliability.py \
            app/services/generated_image_qa_service.py \
            app/services/image_generation_service.py
          pytest -q \
            tests/test_interaction_reliability.py \
            tests/test_partner_selfie_continuity.py \
            tests/test_image_generation_jobs.py \
            tests/test_simple_chat.py \
            tests/test_telegram_runtime_imports.py
          git diff --check
      - name: Commit repaired product file
        run: |
          set -euo pipefail
          find . -type d -name __pycache__ -prune -exec rm -rf {} +
          find . -type f -name '*.pyc' -delete
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add app/services/generated_image_qa_service.py
          git diff --cached --quiet && exit 0
          git commit -m 'Repair compact image QA prompt and validate regression fix'
          git push origin HEAD:agent/fix-image-qa-retry-and-tone-leak
