name: Agent remove new-vs-edit clarification loop

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

env:
  PYTHONDONTWRITEBYTECODE: '1'

jobs:
  patch-test-commit:
    if: github.head_ref == 'fix/remove-new-vs-edit-clarification-loop'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          persist-credentials: true
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Apply product and cleanup patches
        run: |
          set -euo pipefail
          if grep -q 'IMAGE_CLARIFICATION_DEFAULTED_TO_NEW' app/services/semantic_image_intent_router.py; then
            echo 'Main patch already applied'
          else
            python .github/scripts/patch_remove_new_vs_edit_loop.py
          fi
          if grep -A2 'if word_set & chat_markers:' app/services/semantic_image_intent_router.py | grep -q 'return "chat"'; then
            python .github/scripts/patch_clarification_chat_passthrough.py
          else
            echo 'Chat passthrough cleanup already applied'
          fi
      - name: Strict validation
        run: |
          set -euo pipefail
          rm -f .agent-test.log
          find app tests -type d -name __pycache__ -prune -exec rm -rf {} +
          python -B -m py_compile \
            app/services/semantic_image_intent_router.py \
            app/api/telegram.py
          pytest -q \
            tests/test_remove_new_vs_edit_clarification.py \
            tests/test_semantic_image_intent_router.py \
            tests/test_image_generation_jobs.py
          find app tests -type d -name __pycache__ -prune -exec rm -rf {} +
          git diff --check
      - name: Commit clean product changes
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          rm -f .agent-test.log
          find app tests -type d -name __pycache__ -prune -exec rm -rf {} +
          git add -A app tests .agent-test.log
          if git diff --cached --quiet; then
            echo 'No product changes to commit'
          else
            git commit -m 'Remove new-vs-edit clarification loop for clear photo requests'
            git push origin HEAD:${{ github.head_ref }}
          fi
