name: Run partner selfie QA dedupe

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  dedupe-test-commit:
    if: github.head_ref == 'agent/fix-selfie-scene-identity-continuity'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-selfie-scene-identity-continuity
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Remove duplicate QA clauses
        run: |
          python - <<'PY'
          from pathlib import Path
          path=Path('app/services/generated_image_qa_service.py')
          text=path.read_text(encoding='utf-8')
          while "'selfie_required','selfie_required'" in text:
              text=text.replace("'selfie_required','selfie_required'", "'selfie_required'")
          phrase='When identity_anchor is supplied, compare every visible identity cue against it and set identity_consistency_reasonable=false on any meaningful face, hair, skin-tone, age-appearance, gender-presentation or body-build drift. A casual_selfie must visibly have believable handheld selfie perspective; a staged third-person portrait is not a selfie.'
          while phrase + ' ' + phrase in text:
              text=text.replace(phrase + ' ' + phrase, phrase)
          path.write_text(text,encoding='utf-8')
          verified=path.read_text(encoding='utf-8')
          assert "'selfie_required','selfie_required'" not in verified
          assert phrase + ' ' + phrase not in verified
          PY
      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt
      - name: Compile and test
        run: |
          python -m py_compile \
            app/api/telegram.py \
            app/services/semantic_image_intent_router.py \
            app/services/partner_photo_contract.py \
            app/services/image_pipeline_v2.py \
            app/services/generated_image_qa_service.py \
            app/services/image_generation_service.py
          pytest -q \
            tests/test_partner_selfie_continuity.py \
            tests/test_semantic_image_intent_router.py \
            tests/test_partner_photo_engine.py \
            tests/test_image_generation_jobs.py \
            tests/test_telegram_runtime_imports.py \
            tests/test_interaction_reliability.py \
            tests/test_simple_chat.py
          git diff --check
      - name: Commit validated cleanup
        run: |
          find . -type d -name __pycache__ -prune -exec rm -rf {} +
          find . -type f -name '*.pyc' -delete
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add app/services/generated_image_qa_service.py
          git commit -m 'Deduplicate partner selfie QA constraints'
          git push origin HEAD:agent/fix-selfie-scene-identity-continuity
