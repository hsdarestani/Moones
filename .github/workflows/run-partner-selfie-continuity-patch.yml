name: Run partner selfie continuity patch

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  patch-test-commit:
    if: github.head_ref == 'agent/fix-selfie-scene-identity-continuity'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-selfie-scene-identity-continuity
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Apply final telemetry redaction
        run: |
          python - <<'PY'
          from pathlib import Path
          path=Path('app/services/semantic_image_intent_router.py')
          text=path.read_text(encoding='utf-8')
          old="    extracted = sorted(k for k, v in vi.items() if k != 'confidence' and v not in (None, False, \"\", [], {}) and not (k == 'natural_capture_required' and v is True))\n"
          new="    redacted_field_names={'identity_continuity_required','scene_context_summary'}\n    extracted = sorted(k for k, v in vi.items() if k not in redacted_field_names and k != 'confidence' and v not in (None, False, \"\", [], {}) and not (k == 'natural_capture_required' and v is True))\n"
          if new not in text:
              if old not in text:
                  raise RuntimeError('shadow telemetry target not found')
              text=text.replace(old,new,1)
          path.write_text(text,encoding='utf-8')
          verified=path.read_text(encoding='utf-8')
          assert "redacted_field_names={'identity_continuity_required','scene_context_summary'}" in verified
          PY
      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt
      - name: Compile and test
        run: |
          python -m py_compile \
            app/api/telegram.py \
            app/services/semantic_image_intent_router.py \
            app/services/partner_photo_contract.py \
            app/services/image_pipeline_v2.py \
            app/services/generated_image_qa_service.py \
            app/services/image_generation_service.py
          pytest -q \
            tests/test_partner_selfie_continuity.py \
            tests/test_semantic_image_intent_router.py \
            tests/test_partner_photo_engine.py \
            tests/test_image_generation_jobs.py \
            tests/test_telegram_runtime_imports.py \
            tests/test_interaction_reliability.py \
            tests/test_simple_chat.py
          git diff --check
      - name: Commit validated source
        run: |
          find . -type d -name __pycache__ -prune -exec rm -rf {} +
          find . -type f -name '*.pyc' -delete
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add app/services/semantic_image_intent_router.py
          git commit -m 'Keep partner identity fields out of shadow telemetry' || exit 0
          git pull --rebase origin agent/fix-selfie-scene-identity-continuity
          git push origin HEAD:agent/fix-selfie-scene-identity-continuity
