name: Implement and validate partner photo engine

on:
  pull_request:
    branches:
      - main
    types: [opened, reopened, synchronize]

permissions:
  contents: write

jobs:
  implement-test-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/rebuild-partner-photo-engine
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Apply partner photo engine patch
        id: apply
        continue-on-error: true
        run: |
          set +e
          python - <<'PY'
          from pathlib import Path
          p=Path('scripts/codex_partner_photo_patch.py')
          text=p.read_text(encoding='utf-8')
          if 'def replace_first(' not in text:
              helper='''\ndef replace_first(path: str, old: str, new: str) -> None:\n    p=Path(path); text=p.read_text(encoding='utf-8')\n    if old not in text:\n        if new in text:\n            print('already applied first', path, old[:80]); return\n        raise RuntimeError(f'target not found in {path}: {old[:160]!r}')\n    p.write_text(text.replace(old,new,1),encoding='utf-8')\n\n'''
              text=text.replace('\ndef regex_once(', helper + '\ndef regex_once(', 1)
          marker="replace_once(\n    'app/services/image_generation_service.py',\n    '''    time_context, routine_slot, current_location, recent_conversation, relevant_memories, relationship_state, snapshot = _build_request_context(db, user, user_request)"
          if marker in text:
              text=text.replace(marker, marker.replace('replace_once(', 'replace_first(', 1), 1)
          p.write_text(text,encoding='utf-8')
          compile(text,str(p),'exec')
          PY
          python scripts/codex_partner_photo_patch.py > /tmp/partner-photo-patch-output.txt 2>&1
          rc=$?
          if [ "$rc" -eq 0 ]; then
            python - <<'PY'
          from pathlib import Path
          import re

          qa=Path('app/services/generated_image_qa_service.py')
          text=qa.read_text(encoding='utf-8')
          import_line='from app.services.partner_photo_contract import prompt_constraints\n'
          if import_line not in text:
              text=text.replace('from app.llm.vision_client import analyze_image_bytes_with_venice\n', 'from app.llm.vision_client import analyze_image_bytes_with_venice\n' + import_line, 1)
          text=text.replace("    lines=['\nSTRICT PARTNER-PHOTO CORRECTION:']", "    lines=['\\nSTRICT PARTNER-PHOTO CORRECTION:']")
          text=text.replace("    return '\n'.join(lines)", "    return '\\n'.join(lines)")
          qa.write_text(text,encoding='utf-8')

          pipeline=Path('app/services/image_pipeline_v2.py')
          ptext=pipeline.read_text(encoding='utf-8')
          clean="""    if getattr(intent, 'expected_subject_count', None) is not None:\n        expected_subject_count=max(0, int(intent.expected_subject_count))\n    elif contract.get('expected_human_subject_count') is not None:\n        expected_subject_count=max(0, int(contract.get('expected_human_subject_count')))\n    else:\n        expected_subject_count=2 if intent.secondary_subject.requested or (intent.interaction in {'kiss','hug','holding_hands'} and intent.secondary_subject.role) else 1\n"""
          pattern=r"    if getattr\(intent, 'expected_subject_count', None\) is not None:.*?(?=    passthrough=)"
          ptext,count=re.subn(pattern,clean,ptext,count=1,flags=re.S)
          if count != 1:
              raise RuntimeError(f'expected subject-count block once, got {count}')
          pipeline.write_text(ptext,encoding='utf-8')

          telegram=Path('app/api/telegram.py')
          ttext=telegram.read_text(encoding='utf-8')
          ttext=ttext.replace("\n    return await svc.send_text(chat_id, cleaned, reply_markup, reply_to_message_id, allow_sending_without_reply)\n\nasync def _typing_loop", "\n\nasync def _typing_loop", 1)
          telegram.write_text(ttext,encoding='utf-8')
          PY
            rc=$?
          fi
          cat /tmp/partner-photo-patch-output.txt
          if [ "$rc" -ne 0 ]; then
            git reset --hard HEAD
          fi
          cp /tmp/partner-photo-patch-output.txt partner-photo-patch-output.txt
          exit "$rc"

      - name: Install dependencies
        if: steps.apply.outcome == 'success'
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Compile modified runtime
        id: compile
        if: steps.apply.outcome == 'success'
        continue-on-error: true
        run: |
          set -o pipefail
          python -m py_compile \
            app/services/partner_photo_contract.py \
            app/services/semantic_image_intent_router.py \
            app/services/image_generation_service.py \
            app/services/image_pipeline_v2.py \
            app/services/generated_image_qa_service.py \
            app/api/telegram.py \
            2>&1 | tee partner-photo-compile-output.txt

      - name: Run focused partner-photo and image tests
        id: focused
        if: steps.apply.outcome == 'success'
        continue-on-error: true
        run: |
          set -o pipefail
          pytest -q \
            tests/test_partner_photo_engine.py \
            tests/test_semantic_image_intent_router.py \
            tests/test_image_generation_reliability.py \
            tests/test_image_pipeline_v2.py \
            tests/test_generated_image_qa_service.py \
            tests/test_image_generation_billing.py \
            tests/test_image_generation_jobs.py \
            2>&1 | tee partner-photo-focused-test-output.txt

      - name: Run interaction and runtime release tests
        id: release
        if: steps.apply.outcome == 'success'
        continue-on-error: true
        run: |
          set -o pipefail
          pytest -q \
            tests/test_image_generation_client.py \
            tests/test_interaction_reliability.py \
            tests/test_interaction_continuity_v2.py \
            tests/test_simple_chat.py \
            tests/test_telegram_runtime_imports.py \
            2>&1 | tee partner-photo-release-test-output.txt

      - name: Validate diff
        id: diff
        if: steps.apply.outcome == 'success'
        continue-on-error: true
        run: git diff --check

      - name: Commit implementation or diagnostics
        if: always()
        run: |
          touch partner-photo-patch-output.txt partner-photo-compile-output.txt partner-photo-focused-test-output.txt partner-photo-release-test-output.txt
          git checkout -- scripts/codex_partner_photo_patch.py
          find . -type d -name __pycache__ -prune -exec rm -rf {} +
          find . -type f -name '*.pyc' -delete
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          if [ '${{ steps.apply.outcome }}' != 'success' ]; then
            git add partner-photo-patch-output.txt
            git commit -m 'Capture partner photo patch failure' || exit 0
          else
            git add \
              app/services/partner_photo_contract.py \
              app/services/semantic_image_intent_router.py \
              app/services/image_generation_service.py \
              app/services/image_pipeline_v2.py \
              app/services/generated_image_qa_service.py \
              app/api/telegram.py \
              tests/test_partner_photo_engine.py \
              partner-photo-patch-output.txt \
              partner-photo-compile-output.txt \
              partner-photo-focused-test-output.txt \
              partner-photo-release-test-output.txt
            git commit -m 'Fix Telegram integration for partner photo engine' || exit 0
          fi
          git pull --rebase origin codex/rebuild-partner-photo-engine
          git push origin HEAD:codex/rebuild-partner-photo-engine

      - name: Enforce validation result
        if: always()
        run: |
          test '${{ steps.apply.outcome }}' = 'success'
          test '${{ steps.compile.outcome }}' = 'success'
          test '${{ steps.focused.outcome }}' = 'success'
          test '${{ steps.release.outcome }}' = 'success'
          test '${{ steps.diff.outcome }}' = 'success'
