name: Run image state object-reference patch

on:
  pull_request:
    branches: [main]
    types: [synchronize, reopened]

permissions:
  contents: write

jobs:
  patch-test-commit:
    if: github.head_ref == 'agent/fix-image-state-object-reference'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-image-state-object-reference
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Apply deterministic patch
        run: python scripts/patch_image_state_object_reference.py
      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt
      - name: Compile and run focused and release suites
        run: |
          python -m py_compile \
            app/api/telegram.py \
            app/services/semantic_image_intent_router.py \
            app/services/partner_photo_contract.py
          pytest -q \
            tests/test_semantic_image_intent_router.py \
            tests/test_partner_photo_engine.py \
            tests/test_telegram_runtime_imports.py \
            tests/test_image_generation_jobs.py \
            tests/test_interaction_reliability.py \
            tests/test_interaction_continuity.py \
            tests/test_simple_chat.py
          git diff --check
      - name: Commit validated source changes
        run: |
          find . -type d -name __pycache__ -prune -exec rm -rf {} +
          find . -type f -name '*.pyc' -delete
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            app/api/telegram.py \
            app/services/semantic_image_intent_router.py \
            app/services/partner_photo_contract.py \
            tests/test_semantic_image_intent_router.py \
            tests/test_partner_photo_engine.py
          git commit -m 'Fix stale image clarification and referenced object photos'
          git push origin HEAD:agent/fix-image-state-object-reference
