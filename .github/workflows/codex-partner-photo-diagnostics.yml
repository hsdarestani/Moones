name: Partner photo engine diagnostics

on:
  push:
    branches:
      - codex/rebuild-partner-photo-engine
  pull_request:
    branches:
      - main
    types: [opened, reopened, synchronize]

permissions:
  contents: write

jobs:
  diagnostics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/rebuild-partner-photo-engine
          fetch-depth: 0
      - name: Collect architecture diagnostics
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          files = [
              'app/services/semantic_image_intent_router.py',
              'app/services/image_generation_service.py',
              'app/services/image_pipeline_v2.py',
              'app/services/generated_image_qa_service.py',
              'app/api/telegram.py',
              'app/services/image_request_state_machine.py',
              'app/core/config.py',
          ]
          patterns = [
              r'def apply_semantic_visual_intent_to_v2_intent',
              r'def construct_resolved_plan',
              r'def compile_image_prompt',
              r'class GeneratedImageQAResult',
              r'def evaluate_generated_image_composition',
              r'def evaluate_single_subject_image',
              r'def corrective_prompt_for_reasons',
              r'درخواست.*صف',
              r'الان.*عکس',
              r'ImageGenerationDenied',
              r'image_clarification',
              r'VisualIntent',
              r'VisualRequirements',
              r'expected_subject_count',
              r'selfie_allowed',
              r'mirror_allowed',
          ]

          out=[]
          for path in files:
              p=Path(path)
              if not p.exists():
                  out.append(f'\n## MISSING {path}\n')
                  continue
              lines=p.read_text(encoding='utf-8').splitlines()
              out.append(f'\n# FILE {path} ({len(lines)} lines)\n')
              hits=[]
              for i,line in enumerate(lines,1):
                  if any(re.search(pat,line,re.I) for pat in patterns):
                      hits.append(i)
              merged=[]
              for i in hits:
                  a=max(1,i-12); b=min(len(lines),i+35)
                  if merged and a <= merged[-1][1]+1:
                      merged[-1]=(merged[-1][0],max(merged[-1][1],b))
                  else:
                      merged.append((a,b))
              for a,b in merged:
                  out.append(f'\n## lines {a}-{b}\n')
                  out.extend(f'{n:04d}: {lines[n-1]}' for n in range(a,b+1))
          Path('codex-partner-photo-diagnostics.txt').write_text('\n'.join(out),encoding='utf-8')
          PY
      - name: Commit diagnostics
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '4189826+github-actions[bot]@users.noreply.github.com'
          git add codex-partner-photo-diagnostics.txt
          git commit -m 'Collect partner photo engine diagnostics' || exit 0
          git push origin HEAD:codex/rebuild-partner-photo-engine
