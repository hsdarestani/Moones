name: Diagnose Venice image provider

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

env:
  PYTHONDONTWRITEBYTECODE: '1'

jobs:
  diagnose:
    if: github.head_ref == 'agent/fix-image-provider-failover'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          persist-credentials: true
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install diagnostic dependency
        run: pip install httpx
      - name: Check production Venice models and smoke-generate
        env:
          VENICE_API_KEY: ${{ secrets.VENICE_API_KEY }}
        run: |
          set -u
          : > .provider-diagnostic.log
          if [ -z "${VENICE_API_KEY:-}" ]; then
            echo 'VENICE_SECRET_PRESENT=false' | tee -a .provider-diagnostic.log
            exit 0
          fi
          echo 'VENICE_SECRET_PRESENT=true' | tee -a .provider-diagnostic.log
          python - <<'PY' 2>&1 | tee -a .provider-diagnostic.log
          import asyncio, os, httpx

          async def main():
              headers={"Authorization":f"Bearer {os.environ['VENICE_API_KEY']}"}
              async with httpx.AsyncClient(timeout=120) as client:
                  response=await client.get("https://api.venice.ai/api/v1/models", params={"type":"image"}, headers=headers)
                  print(f"MODELS_STATUS={response.status_code}")
                  response.raise_for_status()
                  ids={str(item.get('id')) for item in response.json().get('data', [])}
                  for model in ["krea-2-turbo","seedream-v5-lite","venice-sd35","z-image-turbo","lustify-sdxl"]:
                      print(f"MODEL_AVAILABLE {model}={model in ids}")
                  candidates=[m for m in ["seedream-v5-lite","venice-sd35","z-image-turbo"] if m in ids]
                  if not candidates:
                      raise RuntimeError("no_supported_smoke_model")
                  model=candidates[0]
                  payload={
                      "model":model,
                      "prompt":"A natural casual smartphone selfie of one fictional adult person, neutral clothing, daylight, realistic photography",
                      "negative_prompt":"text, watermark, extra people, distorted anatomy",
                      "safe_mode":False,
                      "return_binary":True,
                      "seed":123456,
                      "format":"webp",
                  }
                  if model == "seedream-v5-lite":
                      payload.update({"aspect_ratio":"4:5","resolution":"1K"})
                  else:
                      payload.update({"width":1024,"height":1280})
                  generated=await client.post("https://api.venice.ai/api/v1/image/generate", headers={**headers,"Content-Type":"application/json"}, json=payload)
                  print(f"SMOKE_MODEL={model} STATUS={generated.status_code} CONTENT_TYPE={generated.headers.get('content-type')} BYTES={len(generated.content)}")
                  if generated.status_code >= 400:
                      print("SMOKE_ERROR=" + ' '.join(generated.text.split())[:500])
                  generated.raise_for_status()
                  if not (generated.headers.get('content-type') or '').startswith('image/'):
                      raise RuntimeError("smoke_response_not_image")
                  if len(generated.content) < 10000:
                      raise RuntimeError("smoke_image_too_small")
          asyncio.run(main())
          PY
      - name: Commit diagnostic result
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .provider-diagnostic.log
          git commit -m 'Record Venice image provider diagnostic' || exit 0
          git push origin HEAD:${{ github.head_ref }}
