name: Run final clear routing repair

on:
  pull_request:
    branches: [main]
    types: [synchronize, reopened]

permissions:
  contents: write

jobs:
  finalize:
    if: github.head_ref == 'codex/fix-clear-image-routing-loop'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/fix-clear-image-routing-loop
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Apply final repair script
        run: |
          python - <<'EOF'
          from pathlib import Path
          workflow = Path('.github/workflows/finalize-clear-routing.yml').read_text(encoding='utf-8')
          start_marker = "          python - <<'PY'\n"
          end_marker = "          PY\n"
          start = workflow.index(start_marker) + len(start_marker)
          end = workflow.index(end_marker, start)
          script = '\n'.join(line[10:] if line.startswith('          ') else line for line in workflow[start:end].splitlines())
          exec(compile(script, 'final_routing_repair.py', 'exec'))
          EOF
      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt
      - name: Compile and run release-focused suites
        run: |
          python -m py_compile app/api/telegram.py app/services/semantic_image_intent_router.py
          pytest -q \
            tests/test_semantic_image_intent_router.py \
            tests/test_partner_photo_engine.py \
            tests/test_telegram_runtime_imports.py \
            tests/test_image_generation_jobs.py \
            tests/test_interaction_reliability.py \
            tests/test_interaction_continuity_v2.py \
            tests/test_simple_chat.py
          git diff --check
      - name: Commit final source repair
        run: |
          find . -type d -name __pycache__ -prune -exec rm -rf {} +
          find . -type f -name '*.pyc' -delete
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add app/api/telegram.py app/services/semantic_image_intent_router.py tests/test_semantic_image_intent_router.py
          git commit -m 'Fix clear image routing and clarification recovery' || exit 0
          git pull --rebase origin codex/fix-clear-image-routing-loop
          git push origin HEAD:codex/fix-clear-image-routing-loop
