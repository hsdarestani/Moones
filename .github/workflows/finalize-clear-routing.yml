name: Finalize clear image routing repair

on:
  pull_request:
    branches: [main]
    types: [reopened]

permissions:
  contents: write

jobs:
  finalize:
    if: github.head_ref == 'codex/fix-clear-image-routing-loop'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/fix-clear-image-routing-loop
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Finalize source repair
        run: |
          python - <<'PY'
          from pathlib import Path

          router = Path('app/services/semantic_image_intent_router.py')
          text = router.read_text(encoding='utf-8')

          normalize_start = text.index('def normalize_image_clarification_text(')
          normalize_end = text.index('_NORMALIZED_CLARIFICATION_ANSWERS = {', normalize_start)
          normalize_lines = [
              'def normalize_image_clarification_text(text: str) -> str:',
              '    """Normalize harmless Persian orthographic differences without broad intent matching."""',
              '    normalized = (text or "").strip().replace("\\u200c", " ").replace("ي", "ی").replace("ى", "ی").replace("ك", "ک")',
              '    for ch in "\\n\\t\\r.,،؛;:!؟?…ـ":',
              '        normalized = normalized.replace(ch, " ")',
              '    return " ".join(normalized.split())',
              '',
              '',
              'def _collapse_stretched_clarification_runs(text: str) -> str:',
              '    """Collapse exaggerated runs of 3+ characters while preserving legitimate double letters."""',
              '    if not text:',
              '        return text',
              '    result: list[str] = []',
              '    index = 0',
              '    while index < len(text):',
              '        end = index + 1',
              '        while end < len(text) and text[end] == text[index]:',
              '            end += 1',
              '        run = text[index:end]',
              '        result.append(run[0] if len(run) >= 3 and run[0] != " " else run)',
              '        index = end',
              '    return "".join(result)',
              '',
              '',
          ]
          text = text[:normalize_start] + '\n'.join(normalize_lines) + text[normalize_end:]

          resolver_start = text.index('def resolve_pending_image_clarification(')
          action_start = text.index('    normalized = normalize_image_clarification_text(text)', resolver_start)
          action_end = text.index('    now = now or datetime.utcnow()', action_start)
          action_lines = [
              '    normalized = normalize_image_clarification_text(text)',
              '    action = next((key for key, answers in _NORMALIZED_CLARIFICATION_ANSWERS.items() if normalized in answers), None)',
              '    if action is None:',
              '        stretched = _collapse_stretched_clarification_runs(normalized)',
              '        action = next((key for key, answers in _NORMALIZED_CLARIFICATION_ANSWERS.items() if stretched in answers), None)',
              '    if action is None:',
              '        return None',
          ]
          text = text[:action_start] + '\n'.join(action_lines) + '\n' + text[action_end:]

          helper_start = text.index('def enforce_clear_image_request_action(')
          helper_end = text.index('@dataclass\nclass ConversationTurnSummary:', helper_start)
          helper_lines = [
              'def enforce_clear_image_request_action(',
              '    deterministic_action: str | None,',
              '    decision: SemanticImageDecision,',
              ') -> SemanticImageDecision:',
              '    """Preserve extracted visuals while locking an unambiguous new-photo delivery command."""',
              '    if deterministic_action != SemanticImageAction.GENERATE_NEW:',
              '        return decision',
              '    if decision.action in {SemanticImageAction.STATUS_QUERY, SemanticImageAction.CANCEL_PENDING}:',
              '        return decision',
              '    if (',
              '        decision.action != SemanticImageAction.GENERATE_NEW',
              '        or decision.needs_clarification',
              '        or not decision.media_delivery_requested',
              '    ):',
              '        logger.info(',
              '            "IMAGE_CLEAR_REQUEST_ACTION_LOCKED model_action=%s model_reason=%s",',
              '            decision.action,',
              '            decision.reason_code,',
              '        )',
              '    decision.action = SemanticImageAction.GENERATE_NEW',
              '    decision.media_delivery_requested = True',
              '    decision.needs_clarification = False',
              '    decision.reason_code = "clear_image_delivery_action_locked"',
              '    return decision',
              '',
              '',
              '@dataclass',
              'class ConversationTurnSummary:',
          ]
          text = text[:helper_start] + '\n'.join(helper_lines) + text[helper_end + len('@dataclass\nclass ConversationTurnSummary:'):]
          router.write_text(text, encoding='utf-8')

          telegram = Path('app/api/telegram.py')
          text = telegram.read_text(encoding='utf-8')
          old_import = '    mark_image_clarification_resolved, resolve_pending_image_clarification,\n    validate_source_reference_deterministically)'
          new_import = '    mark_image_clarification_resolved, resolve_pending_image_clarification,\n    enforce_clear_image_request_action, validate_source_reference_deterministically)'
          if old_import in text:
              text = text.replace(old_import, new_import, 1)
          elif 'enforce_clear_image_request_action' not in text:
              raise RuntimeError('semantic routing helper import missing')

          route_start = text.index('        deterministic_action = pending_resolution.action if pending_resolution else canonical_explicit_image_action(text)')
          route_end_marker = '        logger.info("IMAGE_ROUTE_LLM_DECISION user_id=%s action=%s reason_code=%s source_job_id=%s", user.id, semantic_decision.action, semantic_decision.reason_code, getattr(getattr(semantic_decision, \'source_reference\', None), \'job_id\', None))'
          route_end = text.index(route_end_marker, route_start) + len(route_end_marker)
          route_lines = [
              '        deterministic_action = pending_resolution.action if pending_resolution else canonical_explicit_image_action(text)',
              '        routing_text = pending_resolution.effective_request_text if pending_resolution and pending_resolution.action == SemanticImageAction.GENERATE_NEW and pending_resolution.effective_request_text else text',
              "        context = build_semantic_image_router_context(db, user_id=user.id, chat_id=chat_id, current_text=routing_text, telegram_message_id=msg.message_id, reply_to_message=getattr(msg, 'reply_to_message', None), legacy_route_decision=None)",
              '        deterministic_generate_requires_extraction = bool(deterministic_action == SemanticImageAction.GENERATE_NEW)',
              '        if deterministic_action and not deterministic_generate_requires_extraction:',
              "          semantic_decision = SemanticImageDecision(action=deterministic_action, media_delivery_requested=deterministic_action not in {SemanticImageAction.CHAT, SemanticImageAction.STATUS_QUERY, SemanticImageAction.CANCEL_PENDING}, confidence=1.0, reason_code='resolved_structured_image_intent')",
              '        else:',
              '          semantic_decision = await SemanticImageIntentRouter(VeniceSemanticImageIntentModel()).decide(context, shadow_or_evaluation=False)',
              '        semantic_decision = enforce_clear_image_request_action(deterministic_action, semantic_decision)',
              route_end_marker,
          ]
          text = text[:route_start] + '\n'.join(route_lines) + text[route_end:]
          telegram.write_text(text, encoding='utf-8')

          tests = Path('tests/test_semantic_image_intent_router.py')
          text = tests.read_text(encoding='utf-8')
          old_test_import = '    canonical_standalone_image_action,\n    mark_image_clarification_resolved,'
          new_test_import = '    canonical_standalone_image_action,\n    enforce_clear_image_request_action,\n    mark_image_clarification_resolved,'
          if old_test_import in text:
              text = text.replace(old_test_import, new_test_import, 1)

          expected_old = '        "عکس جدید": "generate_new", "یه عکس جدید": "generate_new", "عکس تازه": "generate_new",'
          expected_new = '        "عکس جدید": "generate_new", "یه عکس جدید": "generate_new", "عکس تازه": "generate_new", "تازه": "generate_new", "تاااازه": "generate_new",'
          if expected_old in text:
              text = text.replace(expected_old, expected_new, 1)

          section_start = text.index('def test_clear_image_action_floor_preserves_visual_intent_and_breaks_clarification_loop():')
          section_end = text.index('def test_resolved_and_expired_clarifications_cannot_be_reused():', section_start)
          test_lines = [
              'def test_clear_image_action_floor_preserves_visual_intent_and_breaks_clarification_loop():',
              '    visual = VisualIntent(activity="drinking tea", visible_objects=["tea cup"])',
              '    for model_action in ("chat", "clarify", "refine_previous"):',
              '        decision = SemanticImageDecision(',
              '            action=model_action,',
              '            media_delivery_requested=False,',
              '            confidence=.51,',
              '            reason_code="model_uncertain",',
              '            needs_clarification=model_action == "clarify",',
              '            visual_intent=visual,',
              '        )',
              '        fixed = enforce_clear_image_request_action("generate_new", decision)',
              '        assert fixed.action == "generate_new"',
              '        assert fixed.media_delivery_requested is True',
              '        assert fixed.needs_clarification is False',
              '        assert fixed.visual_intent is visual',
              '        assert fixed.visual_intent.visible_objects == ["tea cup"]',
              '',
              '',
              'def test_stretched_fresh_answer_resolves_pending_clarification():',
              '    db, user, _ = _clarification_db()',
              '    db.add(Message(user_id=user.id, role="user", content="عکس بده ببینمت چایی میخوری", telegram_message_id=41, input_type="text"))',
              '    db.commit()',
              '    resolution = resolve_pending_image_clarification(db, user_id=user.id, text="تاااازه")',
              '    assert resolution is not None',
              '    assert resolution.action == "generate_new"',
              '    assert resolution.effective_request_text == "عکس بده ببینمت چایی میخوری"',
              '',
              '',
              'def test_resolved_and_expired_clarifications_cannot_be_reused():',
          ]
          text = text[:section_start] + '\n'.join(test_lines) + text[section_end + len('def test_resolved_and_expired_clarifications_cannot_be_reused():'):]
          tests.write_text(text, encoding='utf-8')
          PY
      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt
      - name: Compile and run release-focused suites
        run: |
          python -m py_compile app/api/telegram.py app/services/semantic_image_intent_router.py
          pytest -q \
            tests/test_semantic_image_intent_router.py \
            tests/test_partner_photo_engine.py \
            tests/test_telegram_runtime_imports.py \
            tests/test_image_generation_jobs.py \
            tests/test_interaction_reliability.py \
            tests/test_interaction_continuity_v2.py \
            tests/test_simple_chat.py
          git diff --check
      - name: Commit final source repair
        run: |
          find . -type d -name __pycache__ -prune -exec rm -rf {} +
          find . -type f -name '*.pyc' -delete
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add app/api/telegram.py app/services/semantic_image_intent_router.py tests/test_semantic_image_intent_router.py
          git commit -m 'Fix clear image routing and clarification recovery' || exit 0
          git pull --rebase origin codex/fix-clear-image-routing-loop
          git push origin HEAD:codex/fix-clear-image-routing-loop
