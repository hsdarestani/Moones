name: Validate image QA retry and tone repair

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  patch-test-commit:
    if: github.head_ref == 'agent/fix-image-qa-retry-and-tone-leak'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-image-qa-retry-and-tone-leak
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Apply scoped product patch
        id: patch
        run: |
          set +e
          python - <<'PY'
          from pathlib import Path
          path=Path('scripts/patch_image_qa_tone_regression.py')
          text=path.read_text(encoding='utf-8')
          text=text.replace("helpers = '''COMPACT_QA_PROMPT='''", "helpers = \"\"\"COMPACT_QA_PROMPT='''", 1)
          text=text.replace("\n\n'''\nif helpers not in text:", "\n\n\"\"\"\nif helpers not in text:", 1)
          path.write_text(text, encoding='utf-8')
          PY
          python scripts/patch_image_qa_tone_regression.py > patch-image-qa-tone.log 2>&1
          status=$?
          cat patch-image-qa-tone.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload patch diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: patch-image-qa-tone-log
          path: patch-image-qa-tone.log
      - name: Stop on patch failure
        if: steps.patch.outputs.status != '0'
        run: exit 1
      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt
      - name: Compile and run focused regression suites
        run: |
          python -m py_compile \
            app/engine/simple_chat.py \
            app/services/interaction_reliability.py \
            app/services/generated_image_qa_service.py \
            app/services/image_generation_service.py
          pytest -q \
            tests/test_interaction_reliability.py \
            tests/test_partner_selfie_continuity.py \
            tests/test_image_generation_jobs.py \
            tests/test_simple_chat.py \
            tests/test_telegram_runtime_imports.py
          git diff --check
      - name: Commit validated product changes
        run: |
          find . -type d -name __pycache__ -prune -exec rm -rf {} +
          find . -type f -name '*.pyc' -delete
          git restore scripts/patch_image_qa_tone_regression.py
          rm -f patch-image-qa-tone.log
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            app/engine/simple_chat.py \
            app/services/interaction_reliability.py \
            app/services/generated_image_qa_service.py \
            app/services/image_generation_service.py \
            tests/test_interaction_reliability.py \
            tests/test_partner_selfie_continuity.py
          git diff --cached --quiet && exit 0
          git commit -m 'Fix image QA retry and conversational tone leak'
          git push origin HEAD:agent/fix-image-qa-retry-and-tone-leak
