name: Inspect live image failure

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: moones-production
  cancel-in-progress: false

jobs:
  inspect:
    if: github.head_ref == 'ops/inspect-live-image-failure-20260724'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment:
      name: production
    steps:
      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.PROD_SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          install -m 700 -d "$HOME/.ssh"
          printf '%s\n' "$SSH_PRIVATE_KEY" | tr -d '\r' > "$HOME/.ssh/moones_inspect"
          printf '%s\n' "$SSH_KNOWN_HOSTS" | tr -d '\r' > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/moones_inspect" "$HOME/.ssh/known_hosts"

      - name: Deploy temporary diagnostic commit
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_PORT: ${{ secrets.PROD_PORT }}
          PROD_USER: ${{ secrets.PROD_USER }}
          TARGET_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          port="${PROD_PORT:-22}"
          user="${PROD_USER:-root}"
          ssh \
            -i "$HOME/.ssh/moones_inspect" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile="$HOME/.ssh/known_hosts" \
            -o ConnectTimeout=10 \
            -p "$port" \
            "$user@$PROD_HOST" \
            "deploy $TARGET_SHA"

      - name: Fetch protected diagnostic endpoint
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          OPS_TOKEN: moones-imgdiag-20260724-7f9d8e31c41a6b25
        run: |
          set +e
          : > live-image-diagnostic.log
          sleep 8
          for base in "https://$PROD_HOST" "http://$PROD_HOST" "http://$PROD_HOST:8000"; do
            echo "=== TRY $base ===" >> live-image-diagnostic.log
            curl -k -sS --connect-timeout 10 --max-time 180 \
              -H "X-Ops-Token: $OPS_TOKEN" \
              -w '\nHTTP_STATUS=%{http_code}\n' \
              "$base/ops/image-diagnostic-7f9d8e31c41a6b25" \
              >> live-image-diagnostic.log 2>&1
            code=$?
            echo "CURL_EXIT=$code" >> live-image-diagnostic.log
            if grep -q '"settings"' live-image-diagnostic.log; then
              break
            fi
          done
          cat live-image-diagnostic.log
          exit 0

      - name: Upload diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-image-diagnostic
          path: live-image-diagnostic.log
          if-no-files-found: error
          retention-days: 1
