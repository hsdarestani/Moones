name: Allow explicit adult image requests

on:
  push:
    branches:
      - agent/fix-image-generation-pipeline
  pull_request:
    branches:
      - main
    types: [opened, reopened, synchronize]

permissions:
  contents: write

jobs:
  patch-test-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-image-generation-pipeline
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Apply explicit adult routing changes
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              p = Path(path)
              text = p.read_text(encoding='utf-8')
              count = text.count(old)
              if count == 0:
                  if new in text:
                      print(f'already applied: {path}')
                      return
                  raise RuntimeError(f'target not found in {path}: {old[:120]!r}')
              if count != 1:
                  raise RuntimeError(f'expected one target in {path}, found {count}')
              p.write_text(text.replace(old, new, 1), encoding='utf-8')

          replace_once(
              'app/services/image_generation_guardrails.py',
              '''    if explicit_focus:\n        intent.content_classification = v2.ContentClassification.UNSUPPORTED_EXPLICIT_VISIBILITY\n        intent.adult_intent = "explicit_genital_visibility"\n''',
              '''    if explicit_focus:\n        intent.content_classification = v2.ContentClassification.FULL_NUDITY\n        intent.adult_intent = "explicit_genital_visibility"\n''',
          )

          replace_once(
              'app/services/image_generation_guardrails.py',
              '''    if explicit_scene and (privacy in _PUBLIC_PRIVACY_VALUES or environment in _PUBLIC_PRIVACY_VALUES):\n        return AdultScenePolicyResult(routine_context=routine_context, denied_reason="adult_public_scene_not_supported")\n\n    if explicit_scene:\n''',
              '''    if explicit_scene:\n''',
          )

          replace_once(
              'app/services/image_pipeline_v2.py',
              '''    elif intent.adult_intent == 'unsupported_explicit_visibility':\n        intent.content_classification=ContentClassification.UNSUPPORTED_EXPLICIT_VISIBILITY\n    elif any(r=='genitals' and v.visibility_requested for r,v in intent.body_visibility.regions.items()): intent.content_classification=ContentClassification.UNSUPPORTED_EXPLICIT_VISIBILITY\n''',
              '''    elif intent.adult_intent == 'unsupported_explicit_visibility':\n        intent.adult_intent='explicit_genital_visibility'\n        intent.content_classification=ContentClassification.FULL_NUDITY\n    elif any(r=='genitals' and v.visibility_requested for r,v in intent.body_visibility.regions.items()):\n        intent.adult_intent='explicit_genital_visibility'\n        intent.content_classification=ContentClassification.FULL_NUDITY\n''',
          )

          replace_once(
              'app/services/image_pipeline_v2.py',
              '''def evaluate_safety_policy(intent: ImageRequestIntent, context: AdultImagePolicyContext|None=None) -> SafetyDecision:\n    unsupported=[r for r,v in intent.body_visibility.regions.items() if v.visibility_requested and r in {'genitals'}]\n    if intent.content_classification == ContentClassification.UNSUPPORTED_EXPLICIT_VISIBILITY:\n        return SafetyDecision(PolicyDecision.DENY, 'explicit_genital_visibility_not_supported', 'image_policy_unsupported_visibility')\n    if unsupported: return SafetyDecision(PolicyDecision.DENY, 'explicit_genital_visibility_not_supported', 'image_policy_unsupported_visibility')\n    if intent.content_classification != ContentClassification.NORMAL:\n''',
              '''def evaluate_safety_policy(intent: ImageRequestIntent, context: AdultImagePolicyContext|None=None) -> SafetyDecision:\n    explicit_regions=[r for r,v in intent.body_visibility.regions.items() if v.visibility_requested and r in {'genitals'}]\n    if intent.content_classification == ContentClassification.UNSUPPORTED_EXPLICIT_VISIBILITY or explicit_regions:\n        intent.content_classification=ContentClassification.FULL_NUDITY\n        intent.adult_intent=intent.adult_intent or 'explicit_genital_visibility'\n    if intent.content_classification != ContentClassification.NORMAL:\n''',
          )

          replace_once(
              'tests/test_image_generation_reliability.py',
              '''def test_semantic_explicit_anatomy_focus_is_denied_before_generation():\n    intent=v2.ImageRequestIntent(is_image_request=True)\n    visual=VisualIntent(body_or_face_regions=['genital_area'], nudity_level='full_nudity', explicit_anatomy_focus=True)\n    apply_semantic_safety_contract(intent, visual, {'explicit_genital_visibility': True})\n    assert intent.content_classification == v2.ContentClassification.UNSUPPORTED_EXPLICIT_VISIBILITY\n    assert intent.body_visibility.regions['genitals'].visibility_requested is True\n    decision=v2.evaluate_safety_policy(intent, v2.AdultImagePolicyContext(adult_enabled=True, adult_addon_owned=True, adult_addon_enabled=True, fictional_partner_min_age=21))\n    assert decision.decision == v2.PolicyDecision.DENY\n    assert decision.reason_code == 'explicit_genital_visibility_not_supported'\n''',
              '''def test_semantic_explicit_anatomy_focus_uses_allowed_full_nudity_path():\n    intent=v2.ImageRequestIntent(is_image_request=True)\n    visual=VisualIntent(body_or_face_regions=['genital_area'], nudity_level='full_nudity', explicit_anatomy_focus=True)\n    apply_semantic_safety_contract(intent, visual, {'explicit_genital_visibility': True})\n    assert intent.content_classification == v2.ContentClassification.FULL_NUDITY\n    assert intent.adult_intent == 'explicit_genital_visibility'\n    assert intent.body_visibility.regions['genitals'].visibility_requested is True\n    decision=v2.evaluate_safety_policy(intent, v2.AdultImagePolicyContext(adult_enabled=True, adult_addon_owned=True, adult_addon_enabled=True, fictional_partner_min_age=21))\n    assert decision.decision == v2.PolicyDecision.ALLOW\n''',
          )

          replace_once(
              'tests/test_image_generation_reliability.py',
              '''def test_explicit_private_scene_is_preserved_and_public_scene_is_denied():\n''',
              '''def test_explicit_private_and_public_scenes_are_preserved():\n''',
          )
          replace_once(
              'tests/test_image_generation_reliability.py',
              '''    result=apply_adult_scene_policy(public, {'location':'home'})\n    assert result.denied_reason == 'adult_public_scene_not_supported'\n''',
              '''    result=apply_adult_scene_policy(public, {'location':'home'})\n    assert result.denied_reason is None\n    assert result.private_scene_applied is False\n    assert public.scene.scene_key == 'street'\n    assert public.scene.location == 'street'\n''',
          )

          replace_once(
              'tests/test_image_pipeline_v2.py',
              '''    genital=v2.parse_image_intent(v2.normalize_request_v2('عکس بده کصتو ببینم'))\n    assert 'genitals' in genital.body_visibility.regions\n    assert v2.evaluate_safety_policy(genital).reason_code == 'explicit_genital_visibility_not_supported'\n''',
              '''    genital=v2.parse_image_intent(v2.normalize_request_v2('عکس بده کصتو ببینم'))\n    assert 'genitals' in genital.body_visibility.regions\n    assert genital.content_classification == v2.ContentClassification.FULL_NUDITY\n    assert genital.adult_intent == 'explicit_genital_visibility'\n    eligible=v2.AdultImagePolicyContext(adult_enabled=True, adult_addon_owned=True, adult_addon_enabled=True, fictional_partner_min_age=24)\n    assert v2.evaluate_safety_policy(genital, eligible).decision == v2.PolicyDecision.ALLOW\n''',
          )

          replace_once(
              'tests/test_image_pipeline_v2.py',
              '''def test_genital_denial_before_billing_semantics():\n    intent=v2.parse_image_intent(v2.normalize_request_v2('عکس بده کصتو ببینم'))\n    assert 'ها' not in intent.parse_coverage.unmatched_meaningful_tokens\n    assert intent.body_visibility.regions['genitals'].visibility_requested\n    assert v2.evaluate_safety_policy(intent, v2.AdultImagePolicyContext()).reason_code == 'explicit_genital_visibility_not_supported'\n''',
              '''def test_explicit_genital_visibility_uses_adult_entitlement_semantics():\n    intent=v2.parse_image_intent(v2.normalize_request_v2('عکس بده کصتو ببینم'))\n    assert 'ها' not in intent.parse_coverage.unmatched_meaningful_tokens\n    assert intent.body_visibility.regions['genitals'].visibility_requested\n    assert intent.content_classification == v2.ContentClassification.FULL_NUDITY\n    assert v2.evaluate_safety_policy(intent).reason_code == 'adult_policy_context_required'\n    eligible=v2.AdultImagePolicyContext(adult_enabled=True, adult_addon_owned=True, adult_addon_enabled=True, fictional_partner_min_age=24)\n    assert v2.evaluate_safety_policy(intent, eligible).decision == v2.PolicyDecision.ALLOW\n''',
          )
          PY

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Compile modified runtime
        run: |
          python -m py_compile \
            app/services/image_generation_guardrails.py \
            app/services/image_pipeline_v2.py \
            app/services/image_generation_service.py \
            app/services/generated_image_qa_service.py \
            app/services/semantic_image_intent_router.py

      - name: Run focused tests
        run: |
          pytest -q \
            tests/test_image_generation_reliability.py \
            tests/test_image_pipeline_v2.py \
            tests/test_generated_image_qa_service.py \
            tests/test_image_generation_billing.py \
            tests/test_image_generation_jobs.py

      - name: Run release image suite
        run: |
          pytest -q \
            tests/test_semantic_image_intent_router.py \
            tests/test_image_generation_client.py \
            tests/test_interaction_reliability.py \
            tests/test_interaction_continuity_v2.py \
            tests/test_simple_chat.py \
            tests/test_telegram_runtime_imports.py

      - name: Validate and commit
        run: |
          find . -type d -name __pycache__ -prune -exec rm -rf {} +
          find . -type f -name '*.pyc' -delete
          git diff --check
          if git diff --quiet; then
            echo 'No source changes to commit.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add app/services/image_generation_guardrails.py app/services/image_pipeline_v2.py tests/test_image_generation_reliability.py tests/test_image_pipeline_v2.py
          git commit -m 'Allow explicit adult image requests with QA gating'
          git push origin HEAD:agent/fix-image-generation-pipeline
