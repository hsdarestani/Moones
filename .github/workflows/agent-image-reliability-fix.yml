name: Apply image reliability remediation

on:
  push:
    branches:
      - agent/fix-image-generation-pipeline
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-and-validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-image-generation-pipeline
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Prepare deterministic fixer
        run: |
          python - <<'PY'
          from pathlib import Path
          p=Path('tools/apply_image_reliability_fix.py')
          text=p.read_text()
          replacements=[
              (
                  '''replace_once(
              "app/services/image_generation_service.py",
              "provider='venice',model=DEFAULT_IMAGE_MODEL,quote=quote",
              "provider='venice',model=generation_model,quote=quote",
          )''',
                  '''replace_at_least_once(
              "app/services/image_generation_service.py",
              "provider='venice',model=DEFAULT_IMAGE_MODEL,quote=quote",
              "provider='venice',model=generation_model,quote=quote",
              count=1,
          )''',
              ),
              (
                  '''replace_once(
              "app/services/generated_image_qa_service.py",
              "'ambiguous_anatomy','anatomy_not_assessable','anatomy_qa_provider_failure'}:\\n",
              "'ambiguous_anatomy','anatomy_not_assessable','anatomy_qa_provider_failure','anatomy_qa_consensus_incomplete','anatomy_qa_disagreement'}:\\n",
          )''',
                  '''replace_at_least_once(
              "app/services/generated_image_qa_service.py",
              "'ambiguous_anatomy','anatomy_not_assessable','anatomy_qa_provider_failure'}:\\n",
              "'ambiguous_anatomy','anatomy_not_assessable','anatomy_qa_provider_failure','anatomy_qa_consensus_incomplete','anatomy_qa_disagreement'}:\\n",
              count=2,
          )''',
              ),
          ]
          for old,new in replacements:
              if old not in text:
                  raise SystemExit('bootstrap replacement target missing')
              text=text.replace(old,new,1)
          p.write_text(text)
          PY
          python -m py_compile tools/apply_image_reliability_fix.py

      - name: Apply source changes
        run: python tools/apply_image_reliability_fix.py

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Compile changed modules
        run: |
          python -m py_compile \
            app/core/config.py \
            app/services/semantic_image_intent_router.py \
            app/services/image_generation_guardrails.py \
            app/services/generated_image_qa_service.py \
            app/services/image_generation_service.py

      - name: Run focused tests
        run: |
          pytest -q \
            tests/test_image_generation_reliability.py \
            tests/test_generated_image_qa_service.py \
            tests/test_image_generation_billing.py \
            tests/test_image_generation_jobs.py

      - name: Validate diff
        run: git diff --check

      - name: Remove bootstrap files
        run: |
          rm -f tools/apply_image_reliability_fix.py
          rm -f .github/workflows/agent-image-reliability-fix.yml

      - name: Commit generated changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix image safety, adult QA, and scene reliability"
          git push origin HEAD:agent/fix-image-generation-pipeline
