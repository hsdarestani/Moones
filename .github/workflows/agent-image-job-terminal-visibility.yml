name: Agent image job terminal visibility

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

env:
  PYTHONDONTWRITEBYTECODE: '1'

jobs:
  patch-test-commit:
    if: github.head_ref == 'fix/image-job-terminal-visibility'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          persist-credentials: true
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Apply patch
        run: |
          set -euo pipefail
          if grep -q 'IMAGE_STALE_JOB_RECOVERED' app/services/image_generation_service.py; then
            echo 'Patch already applied'
          else
            python .github/scripts/patch_image_job_terminal_visibility.py
          fi
      - name: Strict validation
        run: |
          set -euo pipefail
          find app tests -type d -name __pycache__ -prune -exec rm -rf {} +
          python -B -m py_compile \
            app/services/image_generation_service.py \
            app/services/semantic_image_intent_router.py \
            app/services/partner_photo_contract.py \
            app/api/telegram.py \
            app/main.py
          pytest -q \
            tests/test_image_job_terminal_visibility.py \
            tests/test_image_generation_jobs.py \
            tests/test_semantic_image_intent_router.py
          find app tests -type d -name __pycache__ -prune -exec rm -rf {} +
          git diff --check
      - name: Commit clean product state
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          find app tests -type d -name __pycache__ -prune -exec rm -rf {} +
          rm -f .agent-test.log
          git add -A app tests .agent-test.log
          if git diff --cached --quiet; then
            echo 'No product changes to commit'
          else
            git commit -m 'Validate image terminal failures and stale job recovery'
            git push origin HEAD:${{ github.head_ref }}
          fi
