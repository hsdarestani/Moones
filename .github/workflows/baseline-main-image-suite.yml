name: Baseline main image suite

on:
  pull_request:
    branches: [main]
    types: [synchronize, reopened]

permissions:
  contents: write

env:
  PYTHONDONTWRITEBYTECODE: '1'

jobs:
  baseline:
    if: github.head_ref == 'agent/fix-image-provider-failover'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run main baseline
        run: |
          set +e
          mapfile -t suites < <(find tests -maxdepth 1 -type f \( -name 'test_image*.py' -o -name 'test_generated_image*.py' -o -name 'test_partner_photo*.py' -o -name 'test_semantic_image_intent_router.py' -o -name 'test_interaction_continuity*.py' \) | sort)
          pytest -q "${suites[@]}" 2>&1 | tee /tmp/main-image-baseline.log
          code=${PIPESTATUS[0]}
          printf 'BASELINE_EXIT_CODE=%s\n' "$code" >> /tmp/main-image-baseline.log
          exit 0
      - name: Store baseline on PR branch
        run: |
          set -euo pipefail
          git fetch origin agent/fix-image-provider-failover
          git checkout -B agent/fix-image-provider-failover origin/agent/fix-image-provider-failover
          cp /tmp/main-image-baseline.log .main-image-baseline.log
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .main-image-baseline.log
          git commit -m 'Record main image suite baseline' || exit 0
          git push origin HEAD:agent/fix-image-provider-failover
