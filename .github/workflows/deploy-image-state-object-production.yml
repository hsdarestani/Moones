name: Deploy image state object-reference production fix

on:
  pull_request:
    branches: [main]
    types: [opened, reopened]

permissions:
  contents: read

jobs:
  deploy:
    if: github.head_ref == 'ops/deploy-image-state-object-8abc85c'
    runs-on: ubuntu-latest
    environment: moones-production
    timeout-minutes: 30
    steps:
      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.PROD_SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          test -n "$SSH_PRIVATE_KEY"
          test -n "$SSH_KNOWN_HOSTS"
          install -m 700 -d "$HOME/.ssh"
          printf '%s\n' "$SSH_PRIVATE_KEY" | tr -d '\r' > "$HOME/.ssh/moones_deploy"
          printf '%s\n' "$SSH_KNOWN_HOSTS" | tr -d '\r' > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/moones_deploy" "$HOME/.ssh/known_hosts"
      - name: Deploy exact main commit to production
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_PORT: ${{ secrets.PROD_PORT }}
          PROD_USER: ${{ secrets.PROD_USER }}
          TARGET_SHA: 8abc85cb4882684194293ac1d61a3c0161231d2f
        run: |
          set -euo pipefail
          test -n "$PROD_HOST"
          port="${PROD_PORT:-22}"
          user="${PROD_USER:-deploy}"
          ssh \
            -i "$HOME/.ssh/moones_deploy" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile="$HOME/.ssh/known_hosts" \
            -o ConnectTimeout=10 \
            -o ServerAliveInterval=15 \
            -o ServerAliveCountMax=2 \
            -p "$port" \
            "$user@$PROD_HOST" \
            "deploy $TARGET_SHA"
