name: Validate scene and selfie camera geometry

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  patch-test-commit:
    if: github.head_ref == 'agent/fix-scene-selfie-camera-geometry'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-scene-selfie-camera-geometry
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Apply scoped patch
        id: patch
        run: |
          set +e
          python - <<'PY'
          from pathlib import Path
          path=Path('scripts/patch_scene_selfie_geometry.py')
          text=path.read_text(encoding='utf-8')
          old="""old = '''    result.hands_only_matches_request=hands_only_matches
              if requested_full_body and not result.passed:
          '''
          new = '''    result.hands_only_matches_request=hands_only_matches
              result.camera_source_geometry_consistent=camera_geometry
              result.selfie_lens_perspective_plausible=selfie_lens
              result.third_person_viewpoint_detected=third_person
              result.visible_held_phone_detected=visible_held_phone
              if requested_full_body and not result.passed:
          '''"""
          new="""old = "    result.hands_only_matches_request=hands_only_matches\\n"
          new = "    result.hands_only_matches_request=hands_only_matches\\n    result.camera_source_geometry_consistent=camera_geometry\\n    result.selfie_lens_perspective_plausible=selfie_lens\\n    result.third_person_viewpoint_detected=third_person\\n    result.visible_held_phone_detected=visible_held_phone\\n"
          """
          if old not in text:
              raise SystemExit('patcher repair target not found')
          path.write_text(text.replace(old,new,1),encoding='utf-8')
          PY
          python scripts/patch_scene_selfie_geometry.py > patch-scene-selfie.log 2>&1
          status=$?
          cat patch-scene-selfie.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload patch diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: patch-scene-selfie-log
          path: patch-scene-selfie.log
      - name: Stop on patch failure
        if: steps.patch.outputs.status != '0'
        run: exit 1
      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt
      - name: Compile and test
        run: |
          python -m py_compile \
            app/api/telegram.py \
            app/services/semantic_image_intent_router.py \
            app/services/partner_photo_contract.py \
            app/services/image_pipeline_v2.py \
            app/services/generated_image_qa_service.py \
            app/services/image_generation_service.py
          pytest -q \
            tests/test_partner_selfie_continuity.py \
            tests/test_semantic_image_intent_router.py \
            tests/test_partner_photo_engine.py \
            tests/test_image_generation_jobs.py \
            tests/test_telegram_runtime_imports.py \
            tests/test_interaction_reliability.py \
            tests/test_simple_chat.py
          git diff --check
      - name: Commit validated product changes
        run: |
          find . -type d -name __pycache__ -prune -exec rm -rf {} +
          find . -type f -name '*.pyc' -delete
          git restore scripts/patch_scene_selfie_geometry.py
          rm -f patch-scene-selfie.log
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            app/services/semantic_image_intent_router.py \
            app/services/image_generation_service.py \
            app/services/partner_photo_contract.py \
            app/services/generated_image_qa_service.py \
            app/services/image_pipeline_v2.py \
            tests/test_partner_selfie_continuity.py
          git diff --cached --quiet && exit 0
          git commit -m 'Fix current-scene continuity and selfie camera geometry'
          git push origin HEAD:agent/fix-scene-selfie-camera-geometry
