name: Validate final scene and selfie camera geometry

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  test-final-head:
    if: github.head_ref == 'agent/fix-scene-selfie-camera-geometry'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-scene-selfie-camera-geometry
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt
      - name: Compile and test final head
        run: |
          python -m py_compile \
            app/api/telegram.py \
            app/services/semantic_image_intent_router.py \
            app/services/partner_photo_contract.py \
            app/services/image_pipeline_v2.py \
            app/services/generated_image_qa_service.py \
            app/services/image_generation_service.py
          pytest -q \
            tests/test_partner_selfie_continuity.py \
            tests/test_semantic_image_intent_router.py \
            tests/test_partner_photo_engine.py \
            tests/test_image_generation_jobs.py \
            tests/test_telegram_runtime_imports.py \
            tests/test_interaction_reliability.py \
            tests/test_simple_chat.py
          git diff --check
