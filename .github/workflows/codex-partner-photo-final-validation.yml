name: Partner photo engine final CI

on:
  pull_request:
    branches:
      - main
    types: [synchronize]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/rebuild-partner-photo-engine
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt
      - name: Compile runtime
        run: |
          python -m py_compile \
            app/services/partner_photo_contract.py \
            app/services/semantic_image_intent_router.py \
            app/services/image_generation_service.py \
            app/services/image_pipeline_v2.py \
            app/services/generated_image_qa_service.py \
            app/api/telegram.py
      - name: Run focused image suite
        run: |
          pytest -q \
            tests/test_partner_photo_engine.py \
            tests/test_semantic_image_intent_router.py \
            tests/test_image_generation_reliability.py \
            tests/test_image_pipeline_v2.py \
            tests/test_generated_image_qa_service.py \
            tests/test_image_generation_billing.py \
            tests/test_image_generation_jobs.py
      - name: Run release suite
        run: |
          pytest -q \
            tests/test_image_generation_client.py \
            tests/test_interaction_reliability.py \
            tests/test_interaction_continuity_v2.py \
            tests/test_simple_chat.py \
            tests/test_telegram_runtime_imports.py
      - name: Validate diff
        run: git diff --check
