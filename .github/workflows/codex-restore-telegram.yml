name: Restore Telegram runtime surgically

on:
  pull_request:
    branches:
      - main
    types: [synchronize]

permissions:
  contents: write

jobs:
  restore-test-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/rebuild-partner-photo-engine
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Restore Telegram module from main and apply surgical partner-photo changes
        run: |
          git fetch origin main
          git show origin/main:app/api/telegram.py > app/api/telegram.py
          python - <<'PY'
          from pathlib import Path
          import re

          p=Path('app/api/telegram.py')
          text=p.read_text(encoding='utf-8')
          text=text.replace(
              '            "باشه، الان یه عکس برات می‌فرستم.",\n',
              "            __import__('app.services.partner_photo_contract', fromlist=['image_acknowledgement']).image_acknowledgement(getattr(job, 'metadata_json', None)),\n",
              1,
          )
          text=text.replace(
              '            await _send_user_text(telegram_service, chat_id, "این نوع عکس رو نمی‌تونم بفرستم، ولی می‌تونم یه عکس عادی یا عاشقانه‌ی امن بفرستم.", user_id=user.id, surface="chat", user_text=user_text)\n',
              '            await _send_user_text(telegram_service, chat_id, "این بار نتونستم عکس رو درست آماده کنم؛ همون چیزی که می‌خوای رو دوباره بگو تا از نو بگیرمش.", user_id=user.id, surface="chat", user_text=user_text)\n',
              1,
          )
          status='''def _image_status_text(job_summary):\n    if not job_summary: return None\n    from app.services.partner_photo_contract import image_status_text\n    return image_status_text(getattr(job_summary, 'status', None), getattr(job_summary, 'error_code', None))\n\n'''
          text,count=re.subn(r'def _image_status_text\(job_summary\):.*?(?=def _semantic_decision_to_legacy_route)', status, text, count=1, flags=re.S)
          if count != 1: raise RuntimeError(f'image status replacement count={count}')
          old='''        deterministic_action = pending_resolution.action if pending_resolution else canonical_explicit_image_action(text)\n        if deterministic_action:\n          semantic_decision = SemanticImageDecision(action=deterministic_action, media_delivery_requested=deterministic_action not in {SemanticImageAction.CHAT, SemanticImageAction.STATUS_QUERY, SemanticImageAction.CANCEL_PENDING}, confidence=1.0, reason_code='resolved_structured_image_intent')\n        else:\n          semantic_decision = await SemanticImageIntentRouter(VeniceSemanticImageIntentModel()).decide(context, shadow_or_evaluation=False)\n'''
          new='''        deterministic_action = pending_resolution.action if pending_resolution else canonical_explicit_image_action(text)\n        deterministic_generate_requires_extraction = bool(not pending_resolution and deterministic_action == SemanticImageAction.GENERATE_NEW)\n        if deterministic_action and not deterministic_generate_requires_extraction:\n          semantic_decision = SemanticImageDecision(action=deterministic_action, media_delivery_requested=deterministic_action not in {SemanticImageAction.CHAT, SemanticImageAction.STATUS_QUERY, SemanticImageAction.CANCEL_PENDING}, confidence=1.0, reason_code='resolved_structured_image_intent')\n        else:\n          semantic_decision = await SemanticImageIntentRouter(VeniceSemanticImageIntentModel()).decide(context, shadow_or_evaluation=False)\n'''
          if old not in text: raise RuntimeError('semantic routing block missing from main Telegram file')
          text=text.replace(old,new,1)
          text=text.replace(
              '          clarification = "منظورت عکس جدیده، تغییر عکس قبلیه، یا فقط داری درباره‌ش حرف می‌زنی؟"\n',
              '          clarification = "این رو یه عکس تازه بگیرم یا همون عکس قبلی رو تغییر بدم؟"\n',
              1,
          )
          p.write_text(text,encoding='utf-8')
          PY
      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt
      - name: Compile and runtime tests
        run: |
          python -m py_compile app/api/telegram.py app/services/partner_photo_contract.py app/services/semantic_image_intent_router.py app/services/image_generation_service.py app/services/image_pipeline_v2.py app/services/generated_image_qa_service.py
          pytest -q tests/test_telegram_runtime_imports.py tests/test_image_pipeline_v2.py tests/test_partner_photo_engine.py tests/test_semantic_image_intent_router.py
          git diff --check
      - name: Commit restored Telegram module
        run: |
          find . -type d -name __pycache__ -prune -exec rm -rf {} +
          find . -type f -name '*.pyc' -delete
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add app/api/telegram.py
          git commit -m 'Restore Telegram runtime and apply surgical photo UX changes' || exit 0
          git pull --rebase origin codex/rebuild-partner-photo-engine
          git push origin HEAD:codex/rebuild-partner-photo-engine
